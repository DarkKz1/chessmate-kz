[build]
  command = "npm run build"
  publish = ".next"

[[plugins]]
  package = "@netlify/plugin-nextjs"

# Stockfish .wasm files need correct MIME so they execute as WebAssembly
[[headers]]
  for = "/stockfish/*.wasm"
  [headers.values]
    Content-Type = "application/wasm"
    Cache-Control = "public, max-age=31536000, immutable"

[[headers]]
  for = "/stockfish/*.js"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
